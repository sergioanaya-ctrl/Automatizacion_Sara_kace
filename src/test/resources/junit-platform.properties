# Configuracion de ejecucion paralela para Cucumber
# Este archivo controla como Cucumber ejecuta los escenarios en paralelo

# Habilita ejecucion paralela
cucumber.execution.parallel.enabled=true

# Estrategia de paralelizacion:
# - fixed: numero fijo de threads
# - dynamic: ajusta dinamicamente segun carga (RECOMENDADO)
# - custom: configuracion personalizada
cucumber.execution.parallel.config.strategy=fixed

# Numero de threads paralelos para ejecutar escenarios
# Ajusta este valor segun tu sistema:
# - 4-8 para PC normales
# - 8-12 para PC potentes
# - 12-20 para servidores
cucumber.execution.parallel.config.fixed.parallelism=12

# Modo de paralelizacion:
# - same_thread: ejecuta todo en el mismo thread (por defecto, no paralelo)
# - concurrent: ejecuta features y escenarios en paralelo (RECOMENDADO)
cucumber.execution.parallel.config.fixed.max-pool-size=12

# Otras configuraciones
cucumber.publish.enabled=false
cucumber.publish.quiet=true
