serenity.project.name = Sara3 - Automatizacion Cases
serenity.logging = VERBOSE
serenity.take.screenshots = AFTER_EACH_STEP

webdriver.driver = chrome
webdriver.base.url = https://asistenciaapp.kit.sura-konecta.com

# ========================================================
# CONFIGURACION CHROME PARA WINDOWS Y LINUX
# ========================================================
# Opciones críticas para Xvfb + Docker + Headless:
# --new-window: Inicia en nueva ventana (no tab)
# --single-process: CRÍTICO para Docker (evita problemas de multiprocess)
# --disable-setuid-sandbox: CRÍTICO para Docker (desactiva sandbox adicional)
# --window-size: Define tamaño explícito de ventana
# --disable-background-networking: Desactiva red en background
# --disable-client-side-phishing-detection: Reduce overhead
# --disable-component-extensions-with-background-pages: Reduce extensiones
# --disable-default-apps: Sin apps por defecto
# --disable-extensions: Sin extensiones
# --disable-popup-blocking: Sin bloqueo popups (para tests)
# --disable-prompt-on-repost: Sin prompts
# --disable-sync: Sin sincronización
# --enable-automation: Habilita modo automatización
# --headless=new: Nuevo modo headless (más estable)
# --no-first-run: Sin pantalla de primer inicio
# --no-sandbox: CRÍTICO en Docker
# --disable-dev-shm-usage: CRÍTICO en Linux para memoria
# ========================================================
chrome.switches=--headless=new;--single-process;--disable-setuid-sandbox;--window-size=1920,1080;--new-window;--no-first-run;--no-sandbox;--disable-dev-shm-usage;--disable-gpu;--disable-background-networking;--disable-client-side-phishing-detection;--disable-component-extensions-with-background-pages;--disable-default-apps;--disable-extensions;--disable-popup-blocking;--disable-prompt-on-repost;--disable-sync;--enable-automation;--disable-translate;--disable-translate-ui;--disable-blink-features=AutomationControlled;--disable-backing-store-limit
# ========================================================
# CONFIGURACION PARA EJECUCION PARALELA CON MULTIPLES USUARIOS
# ========================================================
# IMPORTANTE: Para ejecucion paralela, cada test debe tener su propia sesion de navegador
# Por eso se desactivan keep.browser.open y se activa restart.browser.each.scenario
serenity.restart.browser.for.each.scenario = true
serenity.keep.browser.open = false 
webdriver.close.driver = true
webdriver.quit.driver = true

# Optimizaciones para ejecucion paralela
serenity.browser.maximized = false
serenity.browser.width = 1920
serenity.browser.height = 1080

# Control de timeouts para evitar bloqueos en paralelo
webdriver.timeouts.implicitlywait = 5000
serenity.timeout = 10000
serenity.keep.browser.open = false
webdriver.close.driver = true
webdriver.quit.driver = true
# ========================================================
# NOTA: Para ejecucion NO paralela (desarrollo/debug):
# - Cambiar serenity.restart.browser.for.each.scenario = false
# - Cambiar serenity.keep.browser.open = true
# - Cambiar webdriver.close.driver = false
# - Cambiar webdriver.quit.driver = false
# ========================================================


