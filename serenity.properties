serenity.project.name = Sara3 - Automatizacion Cases
serenity.logging = VERBOSE
serenity.take.screenshots = FOR_EACH_ACTION

webdriver.driver = chrome
webdriver.base.url = https://asistenciaapp.kit.sura-konecta.com

# ========================================================
# CONFIGURACION CHROME PARA DOCKER (OPTIMIZADA PARA HEADLESS)
# ========================================================
# Flags para Chrome en Docker/Headless:
# --headless: Modo sin interfaz gráfica
# --no-sandbox: CRÍTICO en contenedores Docker
# --disable-dev-shm-usage: CRÍTICO para memoria compartida en Linux
# --disable-gpu: Desactiva GPU (no disponible en contenedores)
# --window-size=1920,1080: Tamaño fijo (--start-maximized no funciona en headless)
# --disable-blink-features=AutomationControlled: Evita detección de automatización
# ========================================================
chrome.switches =--headless;--window-size=1920,1080;--remote-allow-origins=*;--disable-dev-shm-usage;--no-sandbox;--disable-gpu;--disable-blink-features=AutomationControlled;--enable-features=NetworkService,NetworkServiceInProcess
#--headless;
# ========================================================
# CONFIGURACION PARA EJECUCION PARALELA CON MULTIPLES USUARIOS
# ========================================================
# IMPORTANTE: Para ejecucion paralela, cada test debe tener su propia sesion de navegador
# Por eso se desactivan keep.browser.open y se activa restart.browser.each.scenario
serenity.restart.browser.for.each.scenario = true
serenity.keep.browser.open = false 
webdriver.close.driver = true
webdriver.quit.driver = true

# Optimizaciones para ejecucion paralela
serenity.browser.maximized = false
serenity.browser.width = 1920
serenity.browser.height = 1080

# Control de timeouts para evitar bloqueos en paralelo
webdriver.timeouts.implicitlywait = 10000
serenity.timeout = 20000
serenity.keep.browser.open = false
webdriver.close.driver = true
webdriver.quit.driver = true
# ========================================================
# NOTA: Para ejecucion NO paralela (desarrollo/debug):
# - Cambiar serenity.restart.browser.for.each.scenario = false
# - Cambiar serenity.keep.browser.open = true
# - Cambiar webdriver.close.driver = false
# - Cambiar webdriver.quit.driver = false
# ========================================================


