name: Docker - Batch Tests Sara3

on:
  schedule:
    # Ejecutar diariamente a las 2 AM UTC
    - cron: '0 2 * * *'
  
  # Permitir trigger manual
  workflow_dispatch:
    inputs:
      parallelForks:
        description: 'Número de paralelos (1-50)'
        required: false
        default: '8'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/sara3

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout código
        uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Build Docker image
        uses: docker/build-push-action@v4
        with:
          context: .
          push: false
          load: true
          tags: sara3:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Ejecutar batch tests 8 paralelo
        run: |
          docker run --rm \
            -v ${{ github.workspace }}/reports:/app/target/reports \
            -v ${{ github.workspace }}/logs:/app/logs \
            sara3:${{ github.sha }} \
            batch_test_8p.sh

      - name: Upload reportes
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: sara3-batch-reports
          path: |
            reports/
            logs/
          retention-days: 30

      - name: Ver resumen de reportes
        if: always()
        run: |
          echo "## 📊 Reportes Generados" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ -d "reports" ]; then
            echo "### CSV Reports:" >> $GITHUB_STEP_SUMMARY
            ls -lh reports/*.csv 2>/dev/null | awk '{print "- " $9 " (" $5 ")"}' >> $GITHUB_STEP_SUMMARY || echo "No CSV reports found" >> $GITHUB_STEP_SUMMARY
            
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "### HTML Reports:" >> $GITHUB_STEP_SUMMARY
            ls -lh reports/*.html 2>/dev/null | awk '{print "- " $9 " (" $5 ")"}' >> $GITHUB_STEP_SUMMARY || echo "No HTML reports found" >> $GITHUB_STEP_SUMMARY
          fi

  publish:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout código
        uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Log in to Container Registry
        uses: docker/login-action@v2
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v4
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha
            type=raw,value=latest

      - name: Build and push Docker image
        uses: docker/build-push-action@v4
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Crear resumen
        run: |
          echo "## ✅ Imagen Docker Publicada" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Tags:" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          echo "${{ steps.meta.outputs.tags }}" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
